name: Mobile Testing & Telegram Notification

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Yukle (Checkout)
      uses: actions/checkout@v4

    - name: Testleri Icra Et
      run: |
        echo "Mobil testler basladi..."
        echo "Testler ugurla tamamlandi!"

    - name: Telegram Bildirisi Gonder
      if: always()
      run: |
        curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "parse_mode=Markdown" \
          -d "text=🚀 GitHub Actions Hesabati 🚀%0A%0A📌 Repository: ${{ github.repository }}%0A🌿 Branch: ${{ github.ref_name }}%0A📊 Status: Mobil test merhalesi ugurla icra olundu! ✅"
